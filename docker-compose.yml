# docker-compose.yml for browser-use
# Dokploy deployment for Markeye / niihhhall
# Hermes (on Coolify) connects remotely via CDP on port 9222

services:
  browser-use:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: browser-use
    restart: unless-stopped
    ports:
      - "9222:9222"
    volumes:
      - browser-use-data:/data
    environment:
      - IN_DOCKER=True
      - PYTHONUNBUFFERED=1
      - BROWSERUSE_HEADLESS=true
      - ANONYMIZED_TELEMETRY=false
    # Start chromium with remote debugging enabled so Hermes can connect via CDP
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /usr/bin/chromium \
          --headless=new \
          --no-sandbox \
          --disable-dev-shm-usage \
          --disable-gpu \
          --remote-debugging-address=0.0.0.0 \
          --remote-debugging-port=9222 \
          --user-data-dir=/data/profiles/default

volumes:
  browser-use-data:
    driver: local
