# docker-compose.yml for browser-use
# Dokploy deployment for Markeye / niihhhall

services:
  browser-use:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: browser-use
    restart: unless-stopped
    ports:
      - "9222:9222"
    environment:
      - IN_DOCKER=True
      - PYTHONUNBUFFERED=1
      - BROWSERUSE_HEADLESS=true
      - ANONYMIZED_TELEMETRY=false
      - CHROME_PATH=/usr/bin/chromium
    command: ["browser-use", "--mcp"]

volumes:
  browser-use-data:
    driver: local
